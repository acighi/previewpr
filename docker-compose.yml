services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "127.0.0.1:6379:6379"

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/previewpr-jobs:/tmp/previewpr-jobs
    depends_on:
      - redis
